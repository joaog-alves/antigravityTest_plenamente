spring.application.name=plenamente-backend

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:plenamentedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT settings (secret key and expiration)
# Secret key must be at least 256 bits (32 characters)
jwt.secret=plenamenteSecretKeyForClinicSystemMustBeLongEnough2026!
jwt.expiration=86400000
